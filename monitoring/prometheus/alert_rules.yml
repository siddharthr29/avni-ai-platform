groups:
  - name: avni_ai_alerts
    rules:
      # --- LLM & Inference ---
      - alert: HighLLMLatency
        expr: histogram_quantile(0.95, rate(llm_request_duration_seconds_bucket[5m])) > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "LLM p95 latency exceeds 5 seconds"
          description: "The 95th percentile LLM request latency is {{ $value }}s over the last 5 minutes."
          runbook_url: "docs/RUNBOOK.md#highlllmlatency"

      - alert: LLMRequestFailureRate
        expr: rate(llm_request_errors_total[5m]) / rate(llm_requests_total[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "LLM request failure rate exceeds 10%"
          description: "{{ $value | humanizePercentage }} of LLM requests are failing."
          runbook_url: "docs/RUNBOOK.md#llmrequestfailurerate"

      - alert: OllamaDown
        expr: up{job="ollama"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Ollama inference server is down"
          description: "Ollama has been unreachable for more than 1 minute."
          runbook_url: "docs/RUNBOOK.md#ollamadown"

      - alert: OllamaHighMemory
        expr: container_memory_usage_bytes{name="ollama"} / container_spec_memory_limit_bytes{name="ollama"} > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Ollama container memory usage above 90%"
          description: "Ollama memory at {{ $value | humanizePercentage }}. Risk of OOM kill."
          runbook_url: "docs/RUNBOOK.md#ollamahighmemory"

      # --- RAG & Vector Store ---
      - alert: RAGRetrievalSlow
        expr: histogram_quantile(0.95, rate(rag_retrieval_duration_seconds_bucket[5m])) > 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "RAG retrieval p95 latency exceeds 1 second"
          description: "RAG retrieval taking {{ $value }}s at p95. Check pgvector index health."
          runbook_url: "docs/RUNBOOK.md#ragretrievalslow"

      - alert: RAGRetrievalEmpty
        expr: increase(rag_retrieval_empty_results_total[15m]) > 20
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "High rate of empty RAG retrieval results"
          description: "{{ $value }} queries returned zero results in the last 15 minutes."
          runbook_url: "docs/RUNBOOK.md#ragretrievalempty"

      # --- HTTP & Application ---
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "HTTP 5xx error rate exceeds 5%"
          description: "{{ $value | humanizePercentage }} of requests returning 5xx errors."
          runbook_url: "docs/RUNBOOK.md#higherrorrate"

      - alert: HighRequestLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "HTTP p95 latency exceeds 3 seconds"
          description: "API p95 latency is {{ $value }}s."
          runbook_url: "docs/RUNBOOK.md#highrequestlatency"

      - alert: BackendDown
        expr: up{job="avni-ai-backend"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Avni AI backend is down"
          description: "The FastAPI backend has been unreachable for 30 seconds."
          runbook_url: "docs/RUNBOOK.md#backenddown"

      # --- Bundle Generation ---
      - alert: BundleGenerationFailed
        expr: increase(bundle_generation_errors_total[1h]) > 5
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "More than 5 bundle generation failures in the last hour"
          description: "{{ $value }} bundle generation errors in the last hour."
          runbook_url: "docs/RUNBOOK.md#bundlegenerationfailed"

      - alert: BundleGenerationSlow
        expr: histogram_quantile(0.95, rate(bundle_generation_duration_seconds_bucket[5m])) > 60
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Bundle generation p95 latency exceeds 60 seconds"
          description: "Bundle generation is taking {{ $value }}s at p95."
          runbook_url: "docs/RUNBOOK.md#bundlegenerationslow"

      # --- Database ---
      - alert: DatabaseDown
        expr: up{job="postgres"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL database is down"
          description: "The avni_ai PostgreSQL database has been unreachable for 30 seconds."
          runbook_url: "docs/RUNBOOK.md#databasedown"

      - alert: DBConnectionPoolExhausted
        expr: pg_stat_activity_count / pg_settings_max_connections > 0.8
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Database connection pool above 80% capacity"
          description: "{{ $value | humanizePercentage }} of max connections in use."
          runbook_url: "docs/RUNBOOK.md#dbconnectionpoolexhausted"

      - alert: DBSlowQueries
        expr: rate(pg_stat_activity_max_tx_duration{datname="avni_ai"}[5m]) > 30
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Long-running database queries detected"
          description: "Queries running longer than 30 seconds detected on avni_ai."
          runbook_url: "docs/RUNBOOK.md#dbslowqueries"

      - alert: DBDeadlocks
        expr: increase(pg_stat_database_deadlocks{datname="avni_ai"}[5m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Database deadlocks detected"
          description: "{{ $value }} deadlocks detected in the last 5 minutes."
          runbook_url: "docs/RUNBOOK.md#dbdeadlocks"

      # --- Infrastructure ---
      - alert: DiskSpaceHigh
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk space below 20% available"
          description: "Only {{ $value | humanizePercentage }} disk space remaining."
          runbook_url: "docs/RUNBOOK.md#diskspacehigh"

      - alert: DiskSpaceCritical
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Disk space below 5% — immediate action required"
          description: "Only {{ $value | humanizePercentage }} disk space remaining."
          runbook_url: "docs/RUNBOOK.md#diskspacecritical"

      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes{job="avni-ai-backend"} > 2e9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Backend memory usage exceeds 2GB"
          description: "Backend process using {{ $value | humanize1024 }}B of memory."
          runbook_url: "docs/RUNBOOK.md#highmemoryusage"

      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total{job="avni-ai-backend"}[5m]) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Backend CPU usage exceeds 90%"
          description: "Backend averaging {{ $value | humanizePercentage }} CPU over 5 minutes."
          runbook_url: "docs/RUNBOOK.md#highcpuusage"

      # --- Security & Guardrails ---
      - alert: GuardrailTriggered
        expr: increase(guardrail_blocks_total[1h]) > 50
        for: 0m
        labels:
          severity: info
        annotations:
          summary: "High guardrail trigger rate"
          description: "{{ $value }} guardrail blocks in the last hour. Possible abuse."
          runbook_url: "docs/RUNBOOK.md#guardrail-triggered"

      - alert: AuthenticationFailures
        expr: increase(auth_failures_total[15m]) > 20
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "High authentication failure rate"
          description: "{{ $value }} auth failures in 15 minutes. Possible brute-force attempt."
          runbook_url: "docs/RUNBOOK.md#authenticationfailures"

      # --- Embedding & Ingestion ---
      - alert: EmbeddingServiceSlow
        expr: histogram_quantile(0.95, rate(embedding_generation_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Embedding generation p95 latency exceeds 2 seconds"
          description: "Embedding generation taking {{ $value }}s at p95."
          runbook_url: "docs/RUNBOOK.md#embeddingserviceslow"

      - alert: IngestionJobFailed
        expr: increase(ingestion_job_errors_total[1h]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "RAG ingestion job failed"
          description: "{{ $value }} ingestion failures in the last hour."
          runbook_url: "docs/RUNBOOK.md#ingestionjobfailed"
