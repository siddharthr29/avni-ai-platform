apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: avni-ai
  labels:
    app: backend
spec:
  replicas: 4
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [backend]
                topologyKey: kubernetes.io/hostname
      containers:
        - name: backend
          image: avni-ai-backend:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: avni-ai-config
            - secretRef:
                name: avni-ai-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          volumeMounts:
            - name: bundle-output
              mountPath: /tmp/avni_bundles
      volumes:
        - name: bundle-output
          emptyDir: {}
