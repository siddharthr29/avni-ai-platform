apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: avni-ai
  labels:
    app: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: avni_ai
            - name: POSTGRES_DB
              value: avni_ai
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: avni-ai-secrets
                  key: DB_PASSWORD
          args:
            - "-c"
            - "shared_buffers=256MB"
            - "-c"
            - "work_mem=16MB"
            - "-c"
            - "max_connections=100"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "avni_ai"]
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
