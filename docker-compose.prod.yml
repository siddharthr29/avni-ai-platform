version: "3.9"

# =============================================================================
# Avni AI Platform — Production Docker Compose
# Usage:
#   cp .env.production.example .env
#   # Edit .env with real secrets
#   docker compose -f docker-compose.prod.yml up -d --build
# =============================================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL with pgvector
  # ---------------------------------------------------------------------------
  db:
    image: pgvector/pgvector:pg16
    container_name: avni-ai-db
    environment:
      POSTGRES_USER: avni_ai
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      POSTGRES_DB: avni_ai
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U avni_ai -d avni_ai"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
    logging: *default-logging
    shm_size: 512m
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "log_min_duration_statement=1000"

  # ---------------------------------------------------------------------------
  # FastAPI backend
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: avni-ai-backend
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8080
      --workers 8
      --log-level info
      --proxy-headers
      --forwarded-allow-ips='*'
      --timeout-keep-alive 75
      --limit-concurrency 200
    environment:
      DATABASE_URL: postgresql://avni_ai:${DB_PASSWORD}@db:5432/avni_ai
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-avni-coder}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      AVNI_BASE_URL: ${AVNI_BASE_URL:-https://app.avniproject.org}
      AVNI_AUTH_TOKEN: ${AVNI_AUTH_TOKEN:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://ai.avniproject.org}
      API_KEYS: ${API_KEYS:?API_KEYS must be set for production}
      RATE_LIMIT_RPM: ${RATE_LIMIT_RPM:-30}
      MCP_SERVER_URL: ${MCP_SERVER_URL:-http://host.docker.internal:8023}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-20250514}
      MAX_TOKENS: ${MAX_TOKENS:-4096}
      BUNDLE_OUTPUT_DIR: /tmp/avni_bundles
    volumes:
      - bundle_output:/tmp/avni_bundles
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "4.0"
        reservations:
          memory: 1G
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Frontend (Vite build served by nginx)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: avni-ai-frontend
    networks:
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Redis — rate limiting and caching
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: avni-ai-redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: "0.25"
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Nginx reverse proxy with SSL termination
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: avni-ai-nginx
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_data:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/nginx-health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Certbot — automated Let's Encrypt certificate renewal
  # ---------------------------------------------------------------------------
  certbot:
    image: certbot/certbot:latest
    container_name: avni-ai-certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - certbot_data:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.1"
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Automated PostgreSQL backups
  # ---------------------------------------------------------------------------
  backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: avni-ai-backup
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: avni_ai
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: avni_ai
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 30
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      HEALTHCHECK_PORT: 8080
    volumes:
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Nginx Prometheus Exporter
  # ---------------------------------------------------------------------------
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.1
    container_name: avni-ai-nginx-exporter
    command:
      - "--nginx.scrape-uri=http://nginx:8080/stub_status"
    depends_on:
      nginx:
        condition: service_healthy
    networks:
      - backend
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9113/metrics || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.1"
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # AlertManager
  # ---------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: avni-ai-alertmanager
    entrypoint:
      - /bin/sh
      - -c
      - |
        envsubst < /etc/alertmanager/alertmanager.yml.tmpl > /etc/alertmanager/alertmanager.yml
        exec /bin/alertmanager --config.file=/etc/alertmanager/alertmanager.yml --storage.path=/alertmanager
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      SMTP_SMARTHOST: ${SMTP_SMARTHOST:-smtp.example.com:587}
      SMTP_FROM: ${SMTP_FROM:-alertmanager@avniproject.org}
      SMTP_AUTH_USERNAME: ${SMTP_AUTH_USERNAME:-alertmanager@avniproject.org}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-ops-team@avniproject.org}
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml.tmpl:ro
      - alertmanager_data:/alertmanager
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Prometheus
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: avni-ai-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    depends_on:
      alertmanager:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Grafana
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.1.0
    container_name: avni-ai-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3001}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging: *default-logging

# =============================================================================
# Networks — separate frontend and backend for isolation
# =============================================================================
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true  # No external access — only reachable by services on this network

# =============================================================================
# Named volumes for data persistence
# =============================================================================
volumes:
  pgdata:
    driver: local
  bundle_output:
    driver: local
  certbot_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  redis_data:
    driver: local
  alertmanager_data:
    driver: local
